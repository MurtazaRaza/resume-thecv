<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Resume the CV{% endblock %}</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('cv-theme');
        var dark = stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.dataset.theme = 'dark';
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/diff.js"></script>
  <script src="/static/autogrow.js"></script>
</head>
<body>
  <nav class="topnav">
    <span class="brand">Resume the CV</span>
    <a href="/tracker" {% if request.url.path.startswith('/tracker') %}class="active"{% endif %}>Tracker</a>
    <a href="/editor" {% if request.url.path == '/editor' %}class="active"{% endif %}>Editor</a>
    <a href="/tailor" {% if request.url.path == '/tailor' %}class="active"{% endif %}>Tailor</a>
    <a href="/letters/new" {% if request.url.path == '/letters/new' %}class="active"{% endif %}>Letter</a>
    <a href="/bank" {% if request.url.path == '/bank' %}class="active"{% endif %}>Bank</a>
    <a href="/import" {% if request.url.path == '/import' %}class="active"{% endif %}>Import</a>
    <span class="nav-spacer"></span>
    {% if profiles %}
    <label class="profile-switcher" title="Active profile — switch or add people">
      <span class="profile-switcher-icon" aria-hidden="true">👤</span>
      <select id="profile-select" aria-label="Active profile">
        {% for p in profiles %}
        <option value="{{ p.slug }}" {% if profile and p.slug == profile.slug %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
        <option value="__new__">+ New profile…</option>
      </select>
    </label>
    {% endif %}
    <button type="button" id="theme-toggle" class="btn btn-ghost theme-toggle" aria-pressed="false" aria-label="Switch to dark mode" title="Dark mode">
      <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
      <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
    </button>
    <span class="nav-status" title="Local LLM model">{{ model }}</span>
    {% if not typst_ok %}
      <span class="nav-warn" title="PDF rendering disabled. Put the typst binary in tools/ or brew install typst.">⚠ typst missing</span>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast" hidden></div>
  <script src="/static/theme.js"></script>
  <script src="/static/profile.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
